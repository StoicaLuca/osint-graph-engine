services:
  neo4j:
    image: neo4j:5
    container_name: osint-neo4j
    ports:
      - "7474:7474"   # web UI (Neo4j Browser)
      - "7687:7687"   # bolt protocol (the Python driver talks here)
    environment:
      NEO4J_AUTH: neo4j/osintengine123
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data: